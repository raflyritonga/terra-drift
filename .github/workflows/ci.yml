name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable

      # §0.4: only the official MCP SDK may appear in go.mod
      - name: forbid non-official MCP SDKs
        run: |
          ! grep -E "mark3labs/mcp-go|metoro-io/mcp-golang" go.mod
          grep -q "github.com/modelcontextprotocol/go-sdk" go.mod

      - run: go vet ./...
      - run: go build ./cmd/...
      - run: go test ./...
